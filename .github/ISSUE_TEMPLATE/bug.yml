name: Bug report
description: Something is broken or incorrect
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include enough detail to reproduce.
        Security issues → [Security Advisories](https://github.com/nitaiaharoni1/super-mcp/security/advisories/new), not a public issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps, commands, or MCP/REST calls.
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages or response snippets (redact API keys).
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API / REST
        - MCP
        - Basket optimize
        - Ingestion
        - Web / marketing
        - Docs
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Git SHA, release tag, or main at a date
    validations:
      required: false
