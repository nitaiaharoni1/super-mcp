runConfig:
  runtime: nodejs22
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  - variable: NEXT_PUBLIC_MCP_URL
    secret: NEXT_PUBLIC_MCP_URL
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_ACCESS_EMAIL
    secret: NEXT_PUBLIC_ACCESS_EMAIL
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_POSTHOG_KEY
    secret: NEXT_PUBLIC_POSTHOG_KEY
    availability:
      - BUILD
      - RUNTIME
  # Public EU ingest host — not a secret.
  - variable: NEXT_PUBLIC_POSTHOG_HOST
    value: https://eu.i.posthog.com
    availability:
      - BUILD
      - RUNTIME
